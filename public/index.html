<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AM Store CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ══ LIGHT THEME (default) ══ */
:root{
  --bg:#f5f4f1;
  --bg2:#ffffff;
  --bg3:#f0ede8;
  --bg4:#e8e4de;
  --border:#e2ddd7;
  --border2:#d0cac2;
  --text:#1a1714;
  --text2:#6b6560;
  --text3:#a09892;
  --orange:#e8580a;
  --orange-dim:#fdf0e8;
  --orange-dark:#c04506;
  --green:#1a9e5a;
  --gdim:#e8f7ee;
  --blue:#2563eb;
  --bdim:#eff4ff;
  --amber:#d97706;
  --adim:#fffbeb;
  --red:#dc2626;
  --rdim:#fef2f2;
  --purple:#7c3aed;
  --pdim:#f5f3ff;
  --tg:#0088cc;
  --tgdim:#e8f4fb;
  --font:'Manrope',sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --r:10px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
}
/* ══ DARK THEME ══ */
[data-theme="dark"]{
  --bg:#0f1117;
  --bg2:#161b25;
  --bg3:#1e2535;
  --bg4:#252d3d;
  --border:#2a3348;
  --border2:#334060;
  --text:#e8edf5;
  --text2:#8b9ab5;
  --text3:#4a5a78;
  --orange:#f97316;
  --orange-dim:#2d1505;
  --orange-dark:#fb923c;
  --green:#22c55e;
  --gdim:#0f3324;
  --blue:#3b82f6;
  --bdim:#0f1e3d;
  --amber:#f59e0b;
  --adim:#2d1f05;
  --red:#ef4444;
  --rdim:#2d0f0f;
  --purple:#a78bfa;
  --pdim:#1e1535;
  --tg:#27a7e5;
  --tgdim:#0a2a3d;
  --shadow:none;
  --shadow-md:none;
}

*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh;transition:background .2s,color .2s}

/* ══ LOGIN ══ */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;background:var(--bg)}
.lbox{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:44px 40px;width:100%;max-width:360px;text-align:center;box-shadow:var(--shadow-md)}
.lico{width:64px;height:64px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;background:transparent}
.lico svg{width:64px;height:64px}
.lbox h2{font-size:20px;font-weight:800;margin-bottom:4px;letter-spacing:-.3px}
.lbox p{color:var(--text2);font-size:13px;margin-bottom:28px}
.lbox input{width:100%;padding:11px 16px;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:14px;font-family:var(--font);margin-bottom:12px;transition:border .15s}
.lbox input:focus{outline:none;border-color:var(--orange)}
.lbtn{width:100%;padding:12px;background:var(--orange);border:none;border-radius:var(--r);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);letter-spacing:.2px;transition:background .15s}
.lbtn:hover{background:var(--orange-dark)}
.lerr{color:var(--red);font-size:12px;margin-top:8px}

/* ══ APP ══ */
#app{display:none;flex-direction:column;min-height:100vh}

/* ══ TOPBAR ══ */
.topbar{background:var(--bg2);border-bottom:1.5px solid var(--border);padding:0 20px;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.tlogo{display:flex;align-items:center;gap:10px;margin-right:20px;flex-shrink:0;text-decoration:none}
.tlogo svg{width:32px;height:32px}
.tlogo-text{display:flex;flex-direction:column;line-height:1.1}
.tlogo-main{font-size:15px;font-weight:800;color:var(--orange);letter-spacing:-.3px}
.tlogo-sub{font-size:9px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.8px}
.tnav{display:flex;height:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tnav::-webkit-scrollbar{display:none}
.tnav-b{padding:0 14px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-family:var(--font);font-weight:500;border-bottom:2.5px solid transparent;height:100%;white-space:nowrap;flex-shrink:0;transition:color .15s}
.tnav-b:hover{color:var(--text)}
.tnav-b.on{color:var(--orange);border-bottom-color:var(--orange);font-weight:700}
.tright{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0;padding-left:12px}
.overdue-pill{font-size:11px;font-weight:600;color:#fff;background:var(--red);padding:3px 10px;border-radius:20px;white-space:nowrap}
.theme-toggle{width:32px;height:32px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s}
.theme-toggle:hover{border-color:var(--border2)}
.tlogout{padding:6px 14px;background:transparent;border:1.5px solid var(--border);border-radius:8px;color:var(--text2);cursor:pointer;font-size:12px;font-family:var(--font);font-weight:500;transition:all .15s}
.tlogout:hover{border-color:var(--border2);color:var(--text)}

/* ══ MAIN ══ */
.main{flex:1;padding:20px;max-width:1400px;width:100%;margin:0 auto}

/* ══ STATS ══ */
.stats-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:border-color .15s,transform .1s}
.sc:hover{transform:translateY(-1px)}
.compact-row td{padding:4px 10px!important;font-size:12px!important}
.compact-row .tc{font-size:12px}
.compact-row .tp{font-size:11px}
.sc-on{border-color:var(--orange)!important;box-shadow:0 0 0 2px rgba(232,88,10,.25)!important}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
.sc.c-blue::before{background:var(--blue)}
.sc.c-green::before{background:var(--green)}
.sc.c-orange::before{background:var(--orange)}
.sc.c-red::before{background:var(--red)}
.sc.c-amber::before{background:var(--amber)}
.sc.c-purple::before{background:var(--purple)}
.sc-icon{font-size:18px;margin-bottom:6px;display:block}
.sc-l{font-size:11px;color:var(--text2);font-weight:600;margin-bottom:4px;letter-spacing:.1px}
.sc-v{font-size:22px;font-weight:800;font-family:var(--mono);letter-spacing:-.5px}
.sc-v.blue{color:var(--blue)}.sc-v.green{color:var(--green)}.sc-v.orange{color:var(--orange)}
.sc-v.red{color:var(--red)}.sc-v.amber{color:var(--amber)}.sc-v.purple{color:var(--purple)}

/* ══ TOOLBAR ══ */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.inp,.sel,.area{padding:8px 12px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);color:var(--text);font-size:13px;font-family:var(--font);font-weight:500;transition:border .15s;box-shadow:var(--shadow)}
.inp:focus,.sel:focus,.area:focus{outline:none;border-color:var(--orange)}
.inp{min-width:0}.area{resize:vertical;min-height:60px;width:100%}

/* ══ BUTTONS ══ */
.btn{padding:8px 14px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--bg2);color:var(--text);cursor:pointer;font-size:13px;font-family:var(--font);font-weight:600;transition:all .15s;white-space:nowrap;box-shadow:var(--shadow)}
.btn:hover{background:var(--bg3);border-color:var(--border2)}
.btn:active{transform:scale(.98)}
.btn.orange{background:var(--orange);border-color:var(--orange);color:#fff}.btn.orange:hover{background:var(--orange-dark)}
.btn.blue{background:var(--blue);border-color:var(--blue);color:#fff}.btn.blue:hover{background:#1d4ed8}
.btn.green{background:var(--gdim);color:var(--green);border-color:var(--green)}
.btn.red{color:var(--red);border-color:transparent;background:transparent;box-shadow:none}.btn.red:hover{background:var(--rdim)}
.btn.amber{background:var(--adim);color:var(--amber);border-color:var(--amber)}
.btn.tg{background:var(--tgdim);color:var(--tg);border-color:var(--tg)}
.btn.sm{padding:4px 10px;font-size:12px;border-radius:7px}
.btn.xs{padding:2px 8px;font-size:11px;border-radius:6px}

/* ══ TABLE ══ */
.twrap{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;overflow-x:auto;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;border-bottom:1.5px solid var(--border);background:var(--bg3);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--text)}
td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;font-size:13px;font-weight:500}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
tr.overdue-row{background:var(--rdim)}
tr.overdue-row td{border-left:3px solid var(--red)}
tr.overdue-row:hover td{background:var(--rdim)}
.tid{font-family:var(--mono);font-size:11px;color:var(--text2);font-weight:500}
.tc{font-weight:700}
.tp{font-size:11px;color:var(--text2);font-family:var(--mono);font-weight:400}
.tact{display:flex;gap:4px}
.overdue-dot{display:inline-block;width:7px;height:7px;background:var(--red);border-radius:50%;margin-left:4px;vertical-align:middle}

/* ══ DEVICE TYPE ACCENT ══ */
.type-iphone td:first-child{border-left:3px solid #3b82f6}
.type-samsung td:first-child{border-left:3px solid #22c55e}
.type-ipad td:first-child{border-left:3px solid #8b5cf6}
.type-mac td:first-child{border-left:3px solid #6b7280}
.type-other td:first-child{border-left:3px solid #f59e0b}

/* ══ BADGES ══ */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.1px}
.diag{background:var(--bdim);color:var(--blue)}
.work{background:var(--adim);color:var(--amber)}
.ready{background:var(--gdim);color:var(--green)}
.issued{background:var(--bg4);color:var(--text2)}
.paid{background:var(--gdim);color:var(--green)}
.partial{background:var(--adim);color:var(--amber)}
.unpaid{background:var(--rdim);color:var(--red)}
.status-sel{background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;padding:5px 10px;border-radius:20px;appearance:none;-webkit-appearance:none;outline:none}
.status-sel option{background:#1b2230;color:#ffffff}
select{background-color:var(--bg2);color:var(--text)}

/* ══ MODAL ══ */
.rep-tab{padding:7px 14px;font-size:12px;font-weight:600;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text2);cursor:pointer;transition:all .15s;border-radius:0}
.rep-tab.on{color:var(--orange);border-bottom-color:var(--orange)}
.rep-tab:hover:not(.on){color:var(--text);background:var(--bg3)}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);display:flex;align-items:flex-start;justify-content:center;z-index:500;padding:60px 16px 16px;overflow-y:auto}
.modal{background:var(--bg2);border:1.5px solid var(--border);border-radius:18px;padding:24px;width:100%;max-width:640px;margin:0 auto;box-shadow:var(--shadow-md);position:relative}
.modal.wide{max-width:800px}
.modal.sm{max-width:440px}
.modal h3{font-size:16px;font-weight:800;margin-bottom:18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;letter-spacing:-.2px}
.mid{font-family:var(--mono);font-size:12px;color:var(--text2);background:var(--bg3);padding:3px 9px;border-radius:6px;font-weight:400}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.frow{display:flex;flex-direction:column;gap:5px}
.frow.full{grid-column:1/-1}
.frow label{font-size:11px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.frow .inp,.frow .sel{width:100%}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:16px;border-top:1.5px solid var(--border);flex-wrap:wrap}

/* ══ DETAIL ══ */
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.det-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:6px}
.photo-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.photo-thumb{width:76px;height:76px;object-fit:cover;border-radius:10px;border:1.5px solid var(--border);cursor:pointer}
.photo-add{width:76px;height:76px;border:2px dashed var(--border2);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:24px;transition:all .15s}
.photo-add:hover{border-color:var(--orange);color:var(--orange)}
.comment{background:var(--bg3);border-radius:10px;padding:10px 14px;margin-bottom:8px;border-left:3px solid var(--border2)}
.cm-meta{font-size:11px;color:var(--text2);margin-bottom:4px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;font-weight:600}
.cm-text{font-size:13px;line-height:1.5;font-weight:500}

/* ══ TEMPLATES ══ */
.tpl-item{background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px}
.tpl-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.tpl-text{font-size:13px;line-height:1.6;color:var(--text);margin-bottom:10px;font-weight:500}
.tpl-actions{display:flex;gap:6px;flex-wrap:wrap}

/* ══ REMINDERS ══ */
.reminder-card{background:var(--bg2);border:1.5px solid var(--adim);border-left:4px solid var(--amber);border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow)}
.reminder-card.danger{border-left-color:var(--red);border-color:var(--rdim)}
.reminder-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.reminder-days{font-size:12px;color:var(--amber);font-weight:700}
.reminder-days.red{color:var(--red)}

/* ══ CLIENTS ══ */
.client-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;box-shadow:var(--shadow);transition:all .15s}
.client-card:hover{border-color:var(--orange);box-shadow:var(--shadow-md)}
.client-meta{display:flex;gap:16px;margin-top:8px;font-size:12px;color:var(--text2);flex-wrap:wrap}

/* ══ FINANCE ══ */
.cash-cards{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}
.cash-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow)}
.cash-lbl{font-size:11px;color:var(--text2);font-weight:600;margin-bottom:4px}
.cash-val{font-size:20px;font-weight:800;font-family:var(--mono);letter-spacing:-.5px}
.fin-grid{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:16px}
.fin-block{background:var(--bg2);border:1.5px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
.fin-block h4{font-size:13px;font-weight:700;margin-bottom:12px}
.chart-wrap{position:relative;height:180px}
.exp-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* ══ SECTION TITLE ══ */
.section-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}

/* ══ EMPTY STATE ══ */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px;display:block}
.empty-state p{font-size:14px;font-weight:500}

/* ══ TOAST ══ */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 22px;border-radius:24px;font-size:13px;font-weight:700;z-index:9999;font-family:var(--font);box-shadow:var(--shadow-md)}

/* ══ MOBILE ══ */
@media(max-width:600px){
  .main{padding:12px}
  .stats-grid{grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
  .sc{padding:10px 12px;border-radius:10px}
  .sc-v{font-size:17px}.sc-l{font-size:10px}.sc-icon{font-size:14px;margin-bottom:3px}
  .toolbar{gap:6px}
  .toolbar .inp{width:100%}
  .desktop-table{display:none}
  .mobile-cards{display:block}
  .rep-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;box-shadow:var(--shadow)}
  .rep-card.overdue-row{border-left:4px solid var(--red);background:var(--rdim)}
  .rep-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
  .rep-card-id{font-family:var(--mono);font-size:10px;color:var(--text2);margin-bottom:2px}
  .rep-card-name{font-weight:700;font-size:15px}
  .rep-card-phone{font-size:12px;color:var(--text2);font-family:var(--mono)}
  .rep-card-device{font-size:12px;color:var(--text2);margin-top:3px;font-weight:500}
  .rep-card-right{display:flex;flex-direction:column;gap:5px;align-items:flex-end}
  .rep-card-price{font-family:var(--mono);font-weight:700;font-size:15px}
  .rep-card-actions{display:flex;gap:6px;border-top:1.5px solid var(--border);padding-top:10px;flex-wrap:wrap}
  .rep-card-actions .btn{flex:1;text-align:center;justify-content:center}
  .fg{grid-template-columns:1fr}
  .frow.full{grid-column:auto}
  .det-grid{grid-template-columns:1fr}
  .fin-grid{grid-template-columns:1fr}
  .cash-cards{grid-template-columns:repeat(3,1fr);gap:8px}
  .exp-grid{grid-template-columns:1fr}
  .tlogo-sub{display:none}
  .modal{padding:16px;border-radius:14px}
  .modal h3{font-size:15px}
}
@media(min-width:601px){
  .mobile-cards{display:none}
  .desktop-table{display:block}
}


/* ══ DASHBOARD HOME SCREEN ══ */
.dash-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.dash-title h1{font-size:28px;font-weight:800;letter-spacing:-.7px;margin-bottom:4px}
.dash-title p{color:var(--text2);font-size:14px;font-weight:500}
.dash-date{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;color:var(--text2);font-weight:700;box-shadow:var(--shadow)}
.dash-kpi{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:16px}
.dash-kpi .sc{min-height:118px;display:flex;gap:14px;align-items:center;padding:18px}
.dash-kpi .sc-icon{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0;flex-shrink:0;background:var(--bg3)}
.dash-kpi .sc-v{font-size:30px;margin-bottom:2px}
.dash-kpi .sc-l{font-size:13px;color:var(--text);margin-bottom:2px}
.dash-sub{font-size:12px;color:var(--text2);font-weight:600}
.dash-grid{display:grid;grid-template-columns:1.05fr 1.35fr 1.35fr;gap:14px;margin-bottom:14px}
.dash-grid-2{display:grid;grid-template-columns:1.2fr .95fr 1.35fr;gap:14px;margin-bottom:14px}
.dash-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:16px;padding:18px;box-shadow:var(--shadow);min-width:0}
.dash-card h3{font-size:15px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.fin-line{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);padding:12px 0;font-size:14px;font-weight:600}
.fin-line:last-child{border-bottom:none}.fin-line strong{font-family:var(--mono);font-size:18px}

@media(min-width:901px){
  #app{display:none;min-height:100vh;background:var(--bg);}
  #app.is-ready{display:block!important;}
  .topbar{
    position:fixed;left:0;top:0;bottom:0;width:228px;height:100vh!important;
    padding:18px 12px;background:linear-gradient(180deg,var(--bg2),var(--bg));
    border-right:1.5px solid var(--border);border-bottom:none;
    flex-direction:column!important;align-items:stretch!important;z-index:250;box-shadow:var(--shadow-md)
  }
  .tlogo{margin:0 0 22px 0!important;padding:8px 8px 18px 8px;border-bottom:1px solid var(--border);gap:12px}
  .tlogo img{width:76px!important;max-height:68px!important;height:auto!important;object-fit:contain!important;border-radius:0!important;background:transparent!important;flex-shrink:0}

.set-wrap{display:flex;flex-direction:column;gap:16px;max-width:1280px}
.set-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:4px}
.set-title{display:flex;align-items:center;gap:10px;font-size:24px;font-weight:800;letter-spacing:-.4px}
.set-tabs{display:flex;gap:0;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:0 14px;overflow-x:auto;box-shadow:var(--shadow)}
.set-tab{height:54px;padding:0 18px;border:none;background:transparent;color:var(--text2);font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.set-tab:hover{color:var(--text)}

.set-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}

.set-card h3{font-size:16px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.set-table{width:100%;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.set-row{display:grid;grid-template-columns:1.2fr 1fr .9fr .9fr 90px;gap:10px;align-items:center;padding:12px;border-bottom:1px solid var(--border);font-size:13px}
.set-row:last-child{border-bottom:none}.set-row.head{color:var(--text2);font-size:11px;font-weight:800;text-transform:uppercase;background:var(--bg3)}
.role-badge,.status-badge{display:inline-flex;align-items:center;width:max-content;padding:4px 9px;border-radius:7px;font-size:11px;font-weight:800}
.role-admin{background:rgba(249,115,22,.18);color:var(--orange)}.role-manager{background:rgba(59,130,246,.18);color:var(--blue)}.role-master{background:rgba(124,58,237,.18);color:var(--purple)}.role-finance{background:rgba(34,197,94,.18);color:var(--green)}
.status-active{background:rgba(34,197,94,.18);color:var(--green)}.status-off{background:rgba(239,68,68,.16);color:var(--red)}
.role-list{display:flex;flex-direction:column;gap:9px;color:var(--text2);font-size:13px;line-height:1.45}.role-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px}
.visual-preview{height:230px;border:1px solid var(--border);border-radius:14px;background:linear-gradient(135deg,#111827,#090b10);background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;margin:10px 0 12px}
.visual-preview:after{content:'';position:absolute;inset:0;background:rgba(0,0,0,var(--previewOverlay,.35))}.visual-preview img{position:relative;z-index:2;max-width:220px;max-height:120px;object-fit:contain;filter:drop-shadow(0 10px 30px rgba(255,106,0,.35))}
.visual-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}.range-row{display:grid;grid-template-columns:150px 1fr 56px;align-items:center;gap:12px;margin:14px 0}.range-row input{width:100%;accent-color:var(--orange)}
.bg-presets{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.bg-preset{height:88px;border:1px solid var(--border);border-radius:10px;cursor:pointer;background-size:cover;background-position:center;position:relative;overflow:hidden}.bg-preset.on{outline:2px solid var(--orange)}.bg-preset.on:after{content:'✓';position:absolute;right:8px;bottom:8px;background:var(--orange);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-weight:800}
.settings-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.settings-form-grid .full{grid-column:1/-1}
@media(max-width:900px){.set-grid{grid-template-columns:1fr}.set-row{grid-template-columns:1fr;gap:5px}.set-row.head{display:none}.visual-actions{grid-template-columns:1fr}.bg-presets{grid-template-columns:repeat(2,1fr)}.settings-form-grid{grid-template-columns:1fr}}

/* ══ WAREHOUSE 1C FOLDERS ══ */
.wh-layout{display:grid;grid-template-columns:310px 1fr;gap:14px;align-items:start}

.wh-folder:hover{background:var(--bg3);color:var(--text)}
.wh-folder.on{background:var(--orange-dim);color:var(--orange);box-shadow:inset 3px 0 0 var(--orange)}
.wh-folder.root{font-size:14px;color:var(--text);font-weight:800}
.wh-sub{margin-left:12px}
.wh-model{margin-left:28px;font-size:12px;font-weight:600}
.wh-products{min-width:0}
.wh-path{font-size:12px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin:0 0 10px}
.wh-actions{display:flex;gap:4px;align-items:center}

}

<script>
let TOKEN=localStorage.getItem('crm_token')||'';
let TAB='dashboard';
let repairs=[],allRepairs=[],stats={},masters=[],clients=[],expenses=[],cash={rows:[]},parts=[];
let settings={}, users=[];
let settingTab='users';
let filterStatus='',filterMaster='',searchQ='',sortField='',compactMode=false,finTab='overview',finFrom='',finTo='',finMaster='',finPayMethod='',finPayStatus='',statsMaster='',statsFrom='',statsTo='',stockSearch='',stockCat='',stockLow=false,warehouseFolderPath='',whOpenFolders=JSON.parse(localStorage.getItem('whOpenFolders')||'{}');
let dateFrom='',dateTo='';
let actId='',editId=null,detailId=null,partEditId=null;

const STATUSES=['На діагностиці','В ремонті','Готово','Видано'];
const PAYS=['Не оплачено','Частково','Оплачено'];
const PAYMENT_METHODS=['','Готівка','Картка','Переказ','Безготівка'];
const SB={'На діагностиці':'diag','В ремонті':'work','Готово':'ready','Видано':'issued'};
const PB={'Не оплачено':'unpaid','Частково':'partial','Оплачено':'paid'};

// ── API ──
async function api(method,url,body){
  const o={method,headers:{'x-auth-token':TOKEN}};
  if(body){o.headers['Content-Type']='application/json';o.body=JSON.stringify(body);}
  const r=await fetch(url,o);
  if(r.status===401){doLogout();return null;}
  return r.json();
}
async function apiForm(url,fd){
  const r=await fetch(url,{method:'POST',headers:{'x-auth-token':TOKEN},body:fd});
  return r.json();
}

// ── AUTH ──
async function doLogin(){
  const pwd=document.getElementById('pwd').value;
  const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pwd})});
  const d=await r.json();
  if(!r.ok){document.getElementById('lerr').textContent=d.error;return;}
  TOKEN=d.token;localStorage.setItem('crm_token',TOKEN);
  document.getElementById('login-screen').style.display='none';
  const app=document.getElementById('app');app.classList.add('is-ready');app.style.display='';app.style.flexDirection='';
  loadAll();
}
async function doLogout(){
  await api('POST','/api/logout');
  TOKEN='';localStorage.removeItem('crm_token');location.reload();
}

// ── LOAD ──
async function loadAll(){
  await Promise.all([loadRepairs(),loadAllRepairs(),loadStats(),loadMasters(),loadSettings()]);
  render();
}
async function loadRepairs(){
  let u='/api/repairs?';
  if(filterStatus && filterStatus!=='__overdue')u+='status='+encodeURIComponent(filterStatus)+'&';
  if(filterStatus==='__overdue')u+='overdue=1&';
  if(filterMaster)u+='master='+encodeURIComponent(filterMaster)+'&';
  if(searchQ)u+='search='+encodeURIComponent(searchQ)+'&';
  if(dateFrom)u+='date_from='+dateFrom+'&';
  if(dateTo)u+='date_to='+dateTo+'&';
  if(sortField)u+='sort='+sortField;
  repairs=await api('GET',u)||[];
}
async function loadAllRepairs(){
  allRepairs=await api('GET','/api/repairs?sort=date')||[];
}
async function loadStats(){stats=await api('GET','/api/stats')||{};}
async function loadMasters(){masters=await api('GET','/api/masters')||[];}
async function loadSettings(){settings=await api('GET','/api/settings')||{};applyAccent();}
async function loadUsers(){users=await api('GET','/api/users')||[];}
async function loadClients(q=''){clients=await api('GET','/api/clients?search='+encodeURIComponent(q))||[];}
async function loadExpenses(){expenses=await api('GET','/api/expenses?'+(dateFrom?'date_from='+dateFrom+'&':'')+(dateTo?'date_to='+dateTo:''))||[];}
async function loadCash(){cash=await api('GET','/api/cash?'+(dateFrom?'date_from='+dateFrom+'&':'')+(dateTo?'date_to='+dateTo:''))||{rows:[]};}
async function loadParts(){
  const q=new URLSearchParams();
  if(stockSearch) q.set('search',stockSearch);
  if(stockCat) q.set('category',stockCat);
  if(stockLow) q.set('low','1');
  parts=await api('GET','/api/parts?'+q.toString())||[];
}

// ── NAV ──
function go(tab){
  TAB=tab;
  document.querySelectorAll('.tnav-b').forEach((b,i)=>b.classList.toggle('on',['dashboard','repairs','reminders','clients','finance','warehouse','act','stats','settings'][i]===tab));
  document.querySelectorAll('.mbtn').forEach((b,i)=>b.classList.toggle('on',['dashboard','repairs','new','finance','stats','reminders'][i]===tab));
  if(tab==='clients') loadClients().then(render);
  else if(tab==='finance') Promise.all([loadExpenses(),loadCash(),loadStats()]).then(render).then(initCharts);
  else if(tab==='warehouse') loadParts().then(render);
  else if(tab==='stats') loadStats().then(render);
  else if(tab==='dashboard') loadStats().then(render);
  else if(tab==='settings') Promise.all([loadUsers(),loadSettings(),loadMasters()]).then(render);
  else render();
}

function render(){
  const m=document.getElementById('main');
  if(TAB==='dashboard')     {m.innerHTML=renderDashboard();setTimeout(initDashboardCharts,50);}
  else if(TAB==='repairs')  m.innerHTML=renderRepairs();
  else if(TAB==='reminders')m.innerHTML=renderReminders();
  else if(TAB==='clients')  m.innerHTML=renderClients();
  else if(TAB==='finance')  {m.innerHTML=renderFinance();setTimeout(initCharts,50);}
  else if(TAB==='warehouse') m.innerHTML=renderWarehouse();
  else if(TAB==='act')      m.innerHTML=renderAct();
  else if(TAB==='stats')    {m.innerHTML=renderStatsTab();setTimeout(initStatsCharts,50);}
  else                      m.innerHTML=renderSettings();
  updateOverduePill();
}

function updateOverduePill(){
  const el=document.getElementById('overdue-pill');
  if(stats.overdue>0){el.textContent='⚠ '+stats.overdue;el.style.display='inline';}
  else el.style.display='none';
}

// ── STATUS / PAY BADGE ──
function statusBadge(r){
  return`<select class="badge ${SB[r.status]||'issued'} status-sel" onchange="quickStatus('${r.id}',this.value)" onclick="event.stopPropagation()">
    ${STATUSES.map(s=>`<option value="${s}" ${r.status===s?'selected':''}>${s}</option>`).join('')}
  </select>`;
}
function payBadge(r){
  const currentMethod = r.pay_method || '';
  return`<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap" onclick="event.stopPropagation()">
    <select class="badge ${PB[r.pay_status]||'unpaid'} status-sel" title="Статус оплати" onchange="quickPay('${r.id}',this.value,null)" onclick="event.stopPropagation()">
      ${PAYS.map(st=>`<option value="${st}" ${r.pay_status===st?'selected':''}>${st}</option>`).join('')}
    </select>
    <select class="badge ${currentMethod==='Готівка'?'paid':'diag'} status-sel" title="Спосіб оплати" onchange="quickPayMethod('${r.id}',this.value)" onclick="event.stopPropagation()">
      ${PAYMENT_METHODS.map(m=>`<option value="${m}" ${currentMethod===m?'selected':''}>${m||'Спосіб'}</option>`).join('')}
    </select>
  </div>`;
}
async function quickStatus(id,status){
  await api('PATCH','/api/repairs/'+id+'/status',{status});
  const r=repairs.find(x=>x.id===id);if(r)r.status=status;
  await Promise.all([loadStats(),loadAllRepairs()]);render();
}
async function quickPay(id,pay,method){
  const r=repairs.find(x=>x.id===id) || allRepairs.find(x=>x.id===id) || {};
  const pay_method = method===null ? (r.pay_method || '') : (method || r.pay_method || '');
  await api('PATCH','/api/repairs/'+id+'/pay',{pay_status:pay,pay_method});
  if(r){r.pay_status=pay;r.pay_method=pay_method;}
  await Promise.all([loadStats(),loadAllRepairs()]);render();
}
async function quickPayMethod(id,method){
  const r=repairs.find(x=>x.id===id) || allRepairs.find(x=>x.id===id) || {};
  const pay_status = r.pay_status || 'Не оплачено';
  await api('PATCH','/api/repairs/'+id+'/pay',{pay_status,pay_method:method});
  if(r){r.pay_method=method;r.pay_status=pay_status;}
  await Promise.all([loadStats(),loadAllRepairs()]);render();
}

// ── DRAGGABLE MODAL ──
function makeDraggable(modalEl){
  const handle = modalEl.querySelector('#modal-drag-handle');
  if(!handle) return;
  let isDragging=false, startX=0, startY=0, startLeft=0, startTop=0;
  // Switch modal from flex-center to absolute positioning
  const ov = modalEl.closest('.modal-ov');
  handle.addEventListener('mousedown', e=>{
    if(e.target.closest('button,input,select')) return;
    isDragging=true;
    const rect = modalEl.getBoundingClientRect();
    // First drag: convert from flow to fixed position
    if(!modalEl.style.left){
      modalEl.style.position='fixed';
      modalEl.style.top=rect.top+'px';
      modalEl.style.left=rect.left+'px';
      modalEl.style.margin='0';
      modalEl.style.width=rect.width+'px';
      if(ov){ ov.style.pointerEvents='none'; ov.style.background='transparent'; ov.style.backdropFilter='none'; }
    }
    startX=e.clientX; startY=e.clientY;
    startLeft=parseInt(modalEl.style.left)||rect.left;
    startTop=parseInt(modalEl.style.top)||rect.top;
    e.preventDefault();
  });
  document.addEventListener('mousemove', e=>{
    if(!isDragging) return;
    const dx=e.clientX-startX, dy=e.clientY-startY;
    const newTop=Math.max(10, startTop+dy);
    const newLeft=Math.max(10, Math.min(window.innerWidth-200, startLeft+dx));
    modalEl.style.top=newTop+'px';
    modalEl.style.left=newLeft+'px';
  });
  document.addEventListener('mouseup', ()=>{ isDragging=false; });
}

}
function sendTg(phone,text){
  const cleaned=phone.replace(/\D/g,'').replace(/^380/,'38').replace(/^0/,'380');
  window.open('https://t.me/+'+cleaned,'_blank');
  setTimeout(()=>copyText(text),300);
}

function copyText(text){
  navigator.clipboard.writeText(text).then(()=>{
    const el=document.createElement('div');
    el.textContent='✓ Скопійовано!';
    el.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:9999;font-family:var(--font)';
    document.body.appendChild(el);setTimeout(()=>el.remove(),2000);
  });
}

  const forgotten=repairs.filter(r=>{
    if(r.status!=='Готово')return false;
    // шукаємо дату останньої зміни — беремо date_plan або date_in як орієнтир
    // В реальності треба дату зміни на "Готово", але наближаємо через date_in
    const base=r.date_plan||r.date_in;
    if(!base)return false;
    const diff=Math.floor((today-new Date(base))/(1000*60*60*24));
    return diff>=7;
  });

  // Прострочені (планова дата минула, не готово)
  const overdue=repairs.filter(r=>{
    if(['Готово','Видано'].includes(r.status))return false;
    if(!r.date_plan)return false;
    return r.date_plan<today.toISOString().slice(0,10);
  });

  const forgottenHtml=forgotten.length?forgotten.map(r=>{
    const base=r.date_plan||r.date_in;
    const diff=Math.floor((today-new Date(base))/(1000*60*60*24));
    const tpl=`Нагадуємо! Ваш ${r.type} ${r.model} (замовлення ${r.id}) очікує вас вже ${diff} днів. Будь ласка, заберіть пристрій. AM Store, тел. 073 477 30 90`;
    return`<div class="reminder-card">
      <div class="reminder-head">
        <div>
          <div style="font-weight:600">${r.client}</div>
          <div style="font-family:var(--mono);font-size:12px;color:var(--text2)">${r.phone}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px">${r.type} ${r.model} · ${r.id}</div>
        </div>
        <div style="text-align:right">
          <div class="reminder-days">Очікує ${diff} днів</div>
          ${r.price?`<div style="font-family:var(--mono);font-weight:500;margin-top:4px">${(+r.price).toLocaleString()} ₴</div>`:''}
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn sm blue" onclick="copyText(\`${tpl.replace(/`/g,'\\`')}\`)">Копіювати повідомлення</button>
        <button class="btn sm tg" onclick="sendTg('${r.phone}',\`${tpl.replace(/`/g,'\\`')}\`)">✈ Написати в Telegram</button>
        <button class="btn sm" onclick="callPhone('${r.phone}')">📞 Дзвонити</button>
        <button class="btn sm green" onclick="quickStatus('${r.id}','Видано')">Позначити "Видано"</button>
      </div>
    </div>`;
  }).join(''):`<div style="text-align:center;padding:32px;color:var(--text3)">Всі клієнти забрали свої пристрої ✓</div>`;

  const overdueHtml=overdue.length?overdue.map(r=>{
    const diff=Math.floor((today-new Date(r.date_plan))/(1000*60*60*24));
    const tpl=`Вітаємо! Ваш ${r.type} ${r.model} (замовлення ${r.id}) ще в ремонті. Просимо вибачення за затримку — повідомимо як тільки буде готовий. AM Store`;
    return`<div class="reminder-card" style="border-left-color:var(--red)">
      <div class="reminder-head">
        <div>
          <div style="font-weight:600">${r.client}</div>
          <div style="font-family:var(--mono);font-size:12px;color:var(--text2)">${r.phone}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px">${r.type} ${r.model} · Майстер: ${r.master||'—'}</div>
        </div>
        <div style="text-align:right">
          <div style="color:var(--red);font-size:11px;font-weight:500">Прострочено ${diff} дн.</div>
          <div style="font-size:11px;color:var(--text2);margin-top:2px">Планово: ${r.date_plan}</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn sm blue" onclick="copyText(\`${tpl.replace(/`/g,'\\`')}\`)">Копіювати повідомлення</button>
        <button class="btn sm tg" onclick="sendTg('${r.phone}',\`${tpl.replace(/`/g,'\\`')}\`)">✈ Telegram</button>
        <button class="btn sm" onclick="callPhone('${r.phone}')">📞 Дзвонити</button>
      </div>
    </div>`;
  }).join(''):`<div style="text-align:center;padding:32px;color:var(--text3)">Прострочених немає ✓</div>`;

  return`
  <div style="margin-bottom:24px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <div class="section-title" style="margin:0">Не забрали пристрій 7+ днів після "Готово"</div>
      <span style="background:var(--adim);color:var(--amber);font-size:11px;padding:2px 8px;border-radius:20px">${forgotten.length}</span>
    </div>
    ${forgottenHtml}
  </div>
  <div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <div class="section-title" style="margin:0">Прострочені ремонти</div>
      <span style="background:var(--rdim);color:var(--red);font-size:11px;padding:2px 8px;border-radius:20px">${overdue.length}</span>
    </div>
    ${overdueHtml}
  </div>`;
}

async function openClientDetail(phone,name){
  const ph=decodeURIComponent(phone);
  const history=await api('GET','/api/clients/'+encodeURIComponent(ph)+'/repairs')||[];
  const total=history.reduce((s,r)=>s+(r.price||0),0);
  const rows=history.map(r=>`<tr>
    <td class="tid">${r.id}</td><td>${r.date_in}</td>
    <td>${r.type} ${r.model}</td>
    <td><span class="badge ${SB[r.status]||'issued'}">${r.status}</span></td>
    <td style="font-family:var(--mono)">${r.price?(+r.price).toLocaleString()+' ₴':'—'}</td>
    <td><span class="badge ${PB[r.pay_status]||'unpaid'}">${r.pay_status}</span>
          ${r.pay_method?`<span class="badge ${r.pay_method==='Готівка'?'paid':'diag'}">${r.pay_method}</span>`:''}</td>
  </tr>`).join('');
  const html=`<div class="modal-ov" onclick="if(event.target===this)closeModalC()">
    <div class="modal wide">
      <h3>${name}</h3>
      <div style="font-family:var(--mono);color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:10px">
        ${ph}
        <button class="btn sm tg" onclick="openTg('${ph}')">✈ Telegram</button>
        <button class="btn sm" onclick="callPhone('${ph}')">📞 Дзвонити</button>
      </div>
      <div style="display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap">
        <div class="sc"><div class="sc-l">Ремонтів</div><div class="sc-v blue">${history.length}</div></div>
        <div class="sc"><div class="sc-l">Загальна сума</div><div class="sc-v green">${total.toLocaleString()} ₴</div></div>
      </div>
      <div class="twrap"><table><thead><tr><th>ID</th><th>Дата</th><th>Пристрій</th><th>Статус</th><th>Ціна</th><th>Оплата</th></tr></thead><tbody>${rows}</tbody></table></div>
      <div class="mfoot"><button class="btn" onclick="closeModalC()">Закрити</button></div>
    </div>
  </div>`;
  const mr=document.getElementById('modal-r');if(mr)mr.innerHTML=html;
}
function closeModalC(){const m=document.getElementById('modal-r');if(m)m.innerHTML='';}

// FINANCE TAB
// ════════════════════════════════
function renderFinance(){
  const money = v => Number(v||0);
  const dateOfRepair = r => String((r.date_out || r.date_in || r.created_at || '')).slice(0,10);
  const inDate = d => (!finFrom || String(d||'') >= finFrom) && (!finTo || String(d||'') <= finTo);
  const byMasterFilter = r => !finMaster || (r.master || '') === finMaster;
  const isPaidLike = r => ['Оплачено','Частково'].includes(r.pay_status) && money(r.price) > 0;
  const methodNorm = m => {
    m = (m || 'Готівка').trim();
    if(['Картка','Переказ','Безготівка','Безнал','Mono','Privat','Термінал'].includes(m)) return m;
    return 'Готівка';
  };
  const isCashMethod = m => methodNorm(m) === 'Готівка';
  const isCardMethod = m => !isCashMethod(m);
  const masterOptions = `<option value="">Всі майстри</option>` + masters.map(m=>`<option value="${m.name}" ${finMaster===m.name?'selected':''}>${m.name}</option>`).join('');

  const paidRepairs = getAllRepairs().filter(r => isPaidLike(r) && inDate(dateOfRepair(r)) && byMasterFilter(r));
  const allFilteredRepairs = getAllRepairs().filter(r => inDate(dateOfRepair(r)) && byMasterFilter(r));
  const filtExp = expenses.filter(e => inDate(e.date));
  const filtCash = (cash.rows||[]).filter(c => inDate(c.date));

  const payRowsData = paidRepairs.filter(r => {
    if(finPayMethod){
      if(finPayMethod === 'Безготівка' && !isCardMethod(r.pay_method)) return false;
      else if(finPayMethod !== 'Безготівка' && methodNorm(r.pay_method) !== finPayMethod) return false;
    }
    if(finPayStatus && r.pay_status !== finPayStatus) return false;
    return true;
  }).sort((a,b)=>dateOfRepair(b).localeCompare(dateOfRepair(a)));

  const revenue = paidRepairs.reduce((s,r)=>s+money(r.price),0);
  const cost = paidRepairs.reduce((s,r)=>s+money(r.cost),0);
  const expSum = filtExp.reduce((s,e)=>s+money(e.amount),0);
  const profit = revenue - cost - expSum;
  const cashIncome = paidRepairs.filter(r=>isCashMethod(r.pay_method)).reduce((s,r)=>s+money(r.price),0);
  const cardIncome = paidRepairs.filter(r=>isCardMethod(r.pay_method)).reduce((s,r)=>s+money(r.price),0);
  const debt = allFilteredRepairs.filter(r => r.pay_status !== 'Оплачено' && money(r.price)>0).reduce((s,r)=>s+money(r.price),0);
  const avg = paidRepairs.length ? Math.round(revenue / paidRepairs.length) : 0;

  const dateMasterFilter = `<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px">
    <span style="font-size:12px;color:var(--text2);font-weight:700">Фільтр:</span>
    <input class="inp" type="date" value="${finFrom}" onchange="finFrom=this.value;render();setTimeout(initCharts,50)" style="width:145px"/>
    <input class="inp" type="date" value="${finTo}" onchange="finTo=this.value;render();setTimeout(initCharts,50)" style="width:145px"/>
    <select class="sel" onchange="finMaster=this.value;render();setTimeout(initCharts,50)" style="width:170px">${masterOptions}</select>
    <button class="btn sm" onclick="finFrom='';finTo='';finMaster='';finPayMethod='';finPayStatus='';render();setTimeout(initCharts,50)">Скинути</button>
  </div>`;

  const kpis=`<div class="cash-cards">
    <div class="cash-card"><div class="cash-lbl">Оплачено</div><div class="cash-val green">${revenue.toLocaleString()} ₴</div></div>
    <div class="cash-card"><div class="cash-lbl">Собівартість + витрати</div><div class="cash-val red">${(cost+expSum).toLocaleString()} ₴</div></div>
    <div class="cash-card"><div class="cash-lbl">Прибуток</div><div class="cash-val amber">${profit.toLocaleString()} ₴</div></div>
    <div class="cash-card"><div class="cash-lbl">Готівка</div><div class="cash-val purple">${cashIncome.toLocaleString()} ₴</div></div>
    <div class="cash-card"><div class="cash-lbl">Безготівка</div><div class="cash-val blue">${cardIncome.toLocaleString()} ₴</div></div>
  </div>`;

  const extraKpis=`<div class="cash-cards" style="grid-template-columns:repeat(4,1fr)">
    <div class="cash-card"><div class="cash-lbl">Середній чек</div><div class="cash-val blue">${avg.toLocaleString()} ₴</div></div>
    <div class="cash-card"><div class="cash-lbl">Борги</div><div class="cash-val red">${debt.toLocaleString()} ₴</div></div>
    <div class="cash-card"><div class="cash-lbl">Платежів</div><div class="cash-val green">${paidRepairs.length}</div></div>
    <div class="cash-card"><div class="cash-lbl">Витрати</div><div class="cash-val red">${expSum.toLocaleString()} ₴</div></div>
  </div>`;

  const tabs=`<div style="display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px">
    <button class="rep-tab ${finTab==='overview'?'on':''}" onclick="finTab='overview';render();setTimeout(initCharts,50)">📊 Огляд</button>
    <button class="rep-tab ${finTab==='history'?'on':''}" onclick="finTab='history';render();setTimeout(initPayHistory,50)">📈 Платежі</button>
    <button class="rep-tab ${finTab==='expenses'?'on':''}" onclick="finTab='expenses';render()">💸 Витрати</button>
    <button class="rep-tab ${finTab==='cash'?'on':''}" onclick="finTab='cash';render()">🏦 Каса</button>
  </div>`;

  const months = [];
  const now = new Date();
  for(let i=11;i>=0;i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    months.push(d.toISOString().slice(0,7));
  }
  const monthly = months.map(month=>{
    const mr = paidRepairs.filter(r => dateOfRepair(r).slice(0,7) === month);
    const e = filtExp.filter(x => String(x.date||'').slice(0,7) === month).reduce((s,x)=>s+money(x.amount),0);
    const rev = mr.reduce((s,r)=>s+money(r.price),0);
    const co = mr.reduce((s,r)=>s+money(r.cost),0);
    return {month, count:mr.length, revenue:rev, cost:co, expenses:e, profit:rev-co-e};
  });
  window._financeMonthly = monthly;

  const masterMap = {};
  paidRepairs.forEach(r=>{
    const m = r.master || 'Без майстра';
    if(!masterMap[m]) masterMap[m]={c:0,revenue:0,profit:0};
    masterMap[m].c++;
    masterMap[m].revenue += money(r.price);
    masterMap[m].profit += money(r.price)-money(r.cost);
  });
  const byMaster = Object.entries(masterMap).sort((a,b)=>b[1].profit-a[1].profit).map(([name,m])=>`<tr>
    <td>${name}</td><td>${m.c}</td>
    <td style="font-family:var(--mono);color:var(--green)">${m.revenue.toLocaleString()} ₴</td>
    <td style="font-family:var(--mono);color:${m.profit>=0?'var(--green)':'var(--red)'}">${m.profit.toLocaleString()} ₴</td>
  </tr>`).join('');

  const mRows = monthly.filter(m=>m.count||m.revenue||m.expenses).reverse().map(m=>`<tr>
    <td style="font-family:var(--mono)">${m.month}</td><td>${m.count}</td>
    <td style="font-family:var(--mono)">${m.revenue.toLocaleString()} ₴</td>
    <td style="font-family:var(--mono)">${(m.cost+m.expenses).toLocaleString()} ₴</td>
    <td style="font-family:var(--mono);color:${m.profit>=0?'var(--green)':'var(--red)'}">${m.profit.toLocaleString()} ₴</td>
  </tr>`).join('');

  let tabContent='';
  if(finTab==='overview'){
    tabContent=`${dateMasterFilter}${kpis}${extraKpis}
    <div class="fin-grid">
      <div class="fin-block"><h4>Прибуток по місяцях</h4><div class="chart-wrap"><canvas id="chart-monthly"></canvas></div></div>
      <div class="fin-block"><h4>По майстрах</h4><div class="twrap" style="margin:0"><table style="min-width:0">
        <thead><tr><th>Майстер</th><th>Оплат</th><th>Виручка</th><th>Прибуток</th></tr></thead>
        <tbody>${byMaster||'<tr><td colspan="4" style="text-align:center;padding:16px;color:var(--text3)">Немає даних</td></tr>'}</tbody>
      </table></div></div>
    </div>
    <div class="fin-block" style="margin-top:16px"><h4>По місяцях</h4><div class="twrap" style="margin:0"><table style="min-width:0">
      <thead><tr><th>Місяць</th><th>Оплат</th><th>Виручка</th><th>Собівартість + витрати</th><th>Прибуток</th></tr></thead>
      <tbody>${mRows||'<tr><td colspan="5" style="text-align:center;padding:16px;color:var(--text3)">Немає даних</td></tr>'}</tbody>
    </table></div></div>`;
  }
  else if(finTab==='history'){
    const payFilter=`<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px">
      <input class="inp" type="date" value="${finFrom}" onchange="finFrom=this.value;render();setTimeout(initPayHistory,50)" style="width:145px"/>
      <input class="inp" type="date" value="${finTo}" onchange="finTo=this.value;render();setTimeout(initPayHistory,50)" style="width:145px"/>
      <select class="sel" onchange="finMaster=this.value;render();setTimeout(initPayHistory,50)" style="width:170px">${masterOptions}</select>
      <select class="sel" onchange="finPayMethod=this.value;render();setTimeout(initPayHistory,50)" style="width:150px">
        <option value="" ${!finPayMethod?'selected':''}>Всі методи</option><option ${finPayMethod==='Готівка'?'selected':''}>Готівка</option><option ${finPayMethod==='Картка'?'selected':''}>Картка</option><option ${finPayMethod==='Переказ'?'selected':''}>Переказ</option><option value="Безготівка" ${finPayMethod==='Безготівка'?'selected':''}>Вся безготівка</option>
      </select>
      <select class="sel" onchange="finPayStatus=this.value;render();setTimeout(initPayHistory,50)" style="width:150px">
        <option value="" ${!finPayStatus?'selected':''}>Всі статуси</option><option ${finPayStatus==='Оплачено'?'selected':''}>Оплачено</option><option ${finPayStatus==='Частково'?'selected':''}>Частково</option>
      </select>
      <button class="btn sm" onclick="finFrom='';finTo='';finMaster='';finPayMethod='';finPayStatus='';render();setTimeout(initPayHistory,50)">Скинути</button>
      <button class="btn sm green" onclick="exportFinancePaymentsCSV()">↓ CSV</button>
    </div>`;
    const rows = payRowsData.map(r=>`<tr>
      <td>${dateOfRepair(r)||'—'}</td><td class="tid">${r.id}</td><td><b>${r.client||'—'}</b><div class="tp">${r.phone||''}</div></td>
      <td>${r.type||''} ${r.model||''}</td><td>${r.master||'—'}</td>
      <td><span class="badge ${isCashMethod(r.pay_method)?'ready':'diag'}">${methodNorm(r.pay_method)}</span></td>
      <td><span class="badge ${PB[r.pay_status]||'paid'}">${r.pay_status}</span></td>
      <td style="font-family:var(--mono);color:var(--green)">${money(r.price).toLocaleString()} ₴</td>
      <td style="font-size:12px;color:var(--text2)">Ремонт ${r.id}</td>
    </tr>`).join('');
    const weekMap={};
    payRowsData.forEach(r=>{const d=new Date(dateOfRepair(r)||todayISO());d.setDate(d.getDate()-d.getDay()+1);const wk=d.toISOString().slice(0,10);if(!weekMap[wk])weekMap[wk]={in:0,out:0};weekMap[wk].in+=money(r.price);});
    const weekLabels=Object.keys(weekMap).sort().slice(-12);
    window._payWeeks={labels:weekLabels,in:weekLabels.map(w=>weekMap[w].in),out:weekLabels.map(w=>0)};
    window._financePayments = payRowsData;
    tabContent=`${payFilter}${kpis}<div class="fin-block" style="margin-top:16px"><h4>Надходження по тижнях</h4><div class="chart-wrap"><canvas id="chart-payhistory"></canvas></div></div>
      <div class="fin-block" style="margin-top:16px"><h4>Платежі</h4><div class="twrap" style="margin:0"><table style="min-width:900px"><thead><tr><th>Дата</th><th>ID</th><th>Клієнт</th><th>Пристрій</th><th>Майстер</th><th>Метод</th><th>Статус</th><th>Сума</th><th>Звідки</th></tr></thead><tbody>${rows||'<tr><td colspan="9" style="text-align:center;padding:22px;color:var(--text3)">Платежів немає</td></tr>'}</tbody></table></div></div>`;
  }
  else if(finTab==='expenses'){
    const expRows=filtExp.length?filtExp.map(e=>`<tr>
      <td>${e.date}</td><td>${e.category}</td><td>${e.description}</td>
      <td style="font-family:var(--mono);color:var(--red)">${money(e.amount).toLocaleString()} ₴</td>
      <td>${e.repair_id||'—'}</td>
      <td><button class="btn xs red" onclick="delExpense(${e.id})">✕</button></td>
    </tr>`).join(''):`<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--text3)">Витрат немає</td></tr>`;
    tabContent=`${dateMasterFilter}<div style="display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap"><div class="cash-card"><div class="cash-lbl">Витрати за фільтром</div><div class="cash-val red">${expSum.toLocaleString()} ₴</div></div></div>

  }
  else if(finTab==='cash'){
    const generated = paidRepairs.map(r=>({date:dateOfRepair(r),type:'in',amount:money(r.price),method:methodNorm(r.pay_method),description:`Оплата ремонту ${r.id} — ${r.type||''} ${r.model||''}`,repair_id:r.id,master:r.master||'',source:'repair'}));
    const expenseMovements = filtExp.map(e=>({date:e.date,type:'out',amount:money(e.amount),method:'Витрата',description:`${e.category}: ${e.description||''}`,repair_id:e.repair_id||'',master:'',source:'expense'}));
    const manual = filtCash.filter(c=>!String(c.description||'').startsWith('Оплата R')).map(c=>({...c,source:'manual'}));
    const movements = [...generated,...expenseMovements,...manual].filter(x=>!finMaster || !x.master || x.master===finMaster).sort((a,b)=>String(b.date||'').localeCompare(String(a.date||'')));
    const cashIn = movements.filter(x=>x.type==='in'&&isCashMethod(x.method)).reduce((s,x)=>s+money(x.amount),0);
    const cardIn = movements.filter(x=>x.type==='in'&&isCardMethod(x.method)).reduce((s,x)=>s+money(x.amount),0);
    const out = movements.filter(x=>x.type==='out').reduce((s,x)=>s+money(x.amount),0);
    const rows=movements.map(c=>`<tr>
      <td>${c.date||'—'}</td>
      <td style="color:${c.type==='in'?'var(--green)':'var(--red)'};font-weight:800">${c.type==='in'?'+':'−'}</td>
      <td style="font-family:var(--mono);color:${c.type==='in'?'var(--green)':'var(--red)'}">${money(c.amount).toLocaleString()} ₴</td>
      <td><span class="badge ${isCashMethod(c.method)?'ready':'diag'}">${c.method||'—'}</span></td>
      <td>${c.master||'—'}</td>
      <td>${c.description||'—'} ${c.repair_id?`<span class="tid">${c.repair_id}</span>`:''}</td>
      <td>${c.source==='manual'&&c.id?`<button class="btn xs red" title="Видалення тільки через пароль адміна" onclick="deleteCashRecord(${c.id})">×</button>`:'—'}</td>
    </tr>`).join('');
    tabContent=`${dateMasterFilter}<div class="cash-cards" style="grid-template-columns:repeat(4,1fr)">
        <div class="cash-card"><div class="cash-lbl">Готівка</div><div class="cash-val purple">${cashIn.toLocaleString()} ₴</div></div>
        <div class="cash-card"><div class="cash-lbl">Безготівка</div><div class="cash-val blue">${cardIn.toLocaleString()} ₴</div></div>
        <div class="cash-card"><div class="cash-lbl">Витрати</div><div class="cash-val red">${out.toLocaleString()} ₴</div></div>
        <div class="cash-card"><div class="cash-lbl">Баланс</div><div class="cash-val green">${(cashIn+cardIn-out).toLocaleString()} ₴</div></div>
      </div>
      <div><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div class="section-title" style="margin:0">Вся каса</div><button class="btn sm blue" onclick="openAddCash()">+ Запис</button></div><div class="twrap"><table style="min-width:820px"><thead><tr><th>Дата</th><th>+/−</th><th>Сума</th><th>Метод</th><th>Майстер</th><th>Опис</th><th>Дії</th></tr></thead><tbody>${rows||'<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text3)">Рухів немає</td></tr>'}</tbody></table></div></div>`;
  }
  return`${tabs}${tabContent}<div id="modal-f"></div>`;
}

// STATS TAB

let statsPeriod = 6; // місяців

function moneyFmt(n){ return (Number(n||0)).toLocaleString('uk-UA') + ' ₴'; }
function cssVar(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
function chartText(){ return cssVar('--text2') || '#8b9ab5'; }
function chartGrid(){ return cssVar('--border') || '#2a3348'; }
function chartBg(){ return cssVar('--bg2') || '#161b25'; }

function renderStatsTab(){
  const masterOpts = masters.map(m=>`<option value="${m.name}" ${statsMaster===m.name?'selected':''}>${m.name}</option>`).join('');
  const now = new Date();
  const periodStart = new Date(now.getFullYear(), now.getMonth()-(statsPeriod-1), 1);
  const startStr = statsFrom || periodStart.toISOString().slice(0,10);
  const endStr = statsTo || new Date().toISOString().slice(0,10);
  const source = getAllRepairs();
  const repairDate = r => (r.date_in && String(r.date_in).slice(0,10)) || (r.created_at && String(r.created_at).slice(0,10)) || '';
  const moneyNum = v => Number(v||0);
  const isPaid = r => r.pay_status === 'Оплачено';
  const inRange = r => {
    const d = repairDate(r);
    if(!d) return true;
    if(startStr && d < startStr) return false;
    if(endStr && d > endStr) return false;
    return true;
  };
  const filtered = source.filter(r => (!statsMaster || r.master===statsMaster) && inRange(r));

  const months = [];
  const start = new Date(startStr.slice(0,7)+'-01');
  const end = new Date(endStr.slice(0,7)+'-01');
  for(let d = new Date(start); d <= end; d.setMonth(d.getMonth()+1)) months.push(d.toISOString().slice(0,7));
  const byMonth = months.map(month=>{
    const mr = filtered.filter(r => repairDate(r).slice(0,7) === month);
    const paid = mr.filter(isPaid);
    const revenue = paid.reduce((s,r)=>s+moneyNum(r.price),0);
    const cost = paid.reduce((s,r)=>s+moneyNum(r.cost),0);
    return {month, count: mr.length, paidCount: paid.length, revenue, profit: revenue-cost};
  });

  const totalRep = filtered.length;
  const paidRows = filtered.filter(isPaid);
  const paidCount = paidRows.length;
  const revenue = paidRows.reduce((s,r)=>s+moneyNum(r.price),0);
  const cost = paidRows.reduce((s,r)=>s+moneyNum(r.cost),0);
  const profit = revenue-cost;
  const avgPrice = paidCount ? Math.round(revenue/paidCount) : 0;
  const paidPct = totalRep ? Math.round(paidCount/totalRep*100) : 0;
  const overdueCount = filtered.filter(r=>r.date_plan&&r.date_plan<todayISO()&&!['Готово','Видано','Відмова','Отказ'].includes(r.status)).length;
  const COLORS=['#f97316','#3b82f6','#22c55e','#a78bfa','#f59e0b','#06b6d4','#ec4899'];

  const periodBtns = [
    {v:1,l:'Місяць'},{v:3,l:'3 міс.'},{v:6,l:'6 міс.'},{v:12,l:'Рік'}
  ].map(b=>`<button class="btn${statsPeriod===b.v&&!statsFrom&&!statsTo?' orange':''}" onclick="statsPeriod=${b.v};statsFrom='';statsTo='';go('stats')" style="padding:5px 12px;font-size:12px">${b.l}</button>`).join('');

  const typeMap={}; filtered.forEach(r=>{ const k=r.type||'Інше'; typeMap[k]=(typeMap[k]||0)+1; });
  const types=Object.entries(typeMap).sort((a,b)=>b[1]-a[1]).slice(0,7);
  const typeTotal=types.reduce((s,[,n])=>s+(+n||0),0) || 1;
  const typeRows = types.map(([t,n],i)=>{ const pct=Math.round((+n||0)/typeTotal*100); return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div style="width:10px;height:10px;border-radius:50%;background:${COLORS[i%COLORS.length]};flex-shrink:0"></div>
      <div style="flex:1;font-size:12px;color:var(--text)">${t}</div>
      <div style="font-weight:800;font-size:12px;font-family:var(--mono);color:var(--text)">${n}</div>
      <div style="font-size:11px;color:var(--text2);width:34px;text-align:right">${pct}%</div>
      <div style="width:78px;background:var(--bg3);border-radius:4px;height:6px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${COLORS[i%COLORS.length]};border-radius:4px"></div></div>
    </div>`; }).join('');

  const masterMap={}; filtered.forEach(r=>{ const m=r.master||'Без майстра'; if(!masterMap[m]) masterMap[m]={c:0,revenue:0,profit:0}; masterMap[m].c++; if(isPaid(r)){ masterMap[m].revenue+=moneyNum(r.price); masterMap[m].profit+=moneyNum(r.price)-moneyNum(r.cost); } });
  const masterRows=Object.entries(masterMap).sort((a,b)=>b[1].profit-a[1].profit).slice(0,8);
  const masterCards = masterRows.map(([name,m],i)=>`<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;gap:12px">
      <div style="width:36px;height:36px;border-radius:50%;background:${COLORS[i%COLORS.length]}22;border:2px solid ${COLORS[i%COLORS.length]};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:${COLORS[i%COLORS.length]}">${(name||'?')[0]}</div>
      <div style="flex:1;min-width:0"><div style="font-weight:800;font-size:13px;color:var(--text)">${name}</div><div style="font-size:11px;color:var(--text2)">${m.c||0} рем. · оплачено ${moneyFmt(m.revenue)}</div></div>
      <div style="text-align:right;font-weight:800;font-family:var(--mono);color:${(+m.profit||0)>=0?'var(--green)':'var(--red)'}">${moneyFmt(m.profit)}</div>
    </div>`).join('');

  const statusMap={}; filtered.forEach(r=>{ const s=r.status||'Без статусу'; statusMap[s]=(statusMap[s]||0)+1; });
  const statusColors={'На діагностиці':'#3b82f6','Діагностика':'#3b82f6','В ремонті':'#f59e0b','В роботі':'#f59e0b','Готово':'#22c55e','Видано':'#64748b','Відмова':'#ef4444','Очікує запчастину':'#a78bfa'};
  const statusEntries=Object.entries(statusMap);
  const statusCards = statusEntries.map(([s,n])=>`<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;justify-content:space-between"><span style="font-size:12px;font-weight:700;color:var(--text)">${s}</span><span style="font-size:18px;font-weight:800;font-family:var(--mono);color:${statusColors[s]||'var(--orange)'}">${n}</span></div>`).join('');

  window._statsData = {byMonth, types, statusEntries, COLORS, statusColors};
  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <div style="font-size:18px;font-weight:900;color:var(--text)">📊 Статистика</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">${periodBtns}</div>
  </div>
  <div class="toolbar" style="margin-bottom:16px">
    <select class="sel" onchange="statsMaster=this.value;render();setTimeout(initStatsCharts,50)"><option value="">Всі майстри</option>${masterOpts}</select>
    <input class="inp" type="date" value="${statsFrom}" onchange="statsFrom=this.value;render();setTimeout(initStatsCharts,50)" title="Від"/>
    <input class="inp" type="date" value="${statsTo}" onchange="statsTo=this.value;render();setTimeout(initStatsCharts,50)" title="До"/>
    <button class="btn" onclick="statsMaster='';statsFrom='';statsTo='';render();setTimeout(initStatsCharts,50)">Скинути</button>
    <div style="color:var(--text2);font-size:12px;font-weight:700;padding:8px 0">Показано: ${totalRep} ремонтів${statsMaster?' · '+statsMaster:''}</div>
  </div>
  <div class="stats-kpi-grid" style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:18px">
    <div class="sc c-blue"><span class="sc-icon">🔧</span><div class="sc-l">Ремонтів</div><div class="sc-v blue">${totalRep}</div></div>
    <div class="sc c-green"><span class="sc-icon">📈</span><div class="sc-l">Оплачено</div><div class="sc-v green" style="font-size:15px">${moneyFmt(revenue)}</div></div>
    <div class="sc c-orange"><span class="sc-icon">💰</span><div class="sc-l">Чистий прибуток</div><div class="sc-v orange" style="font-size:15px">${moneyFmt(profit)}</div></div>
    <div class="sc c-purple"><span class="sc-icon">💎</span><div class="sc-l">Середній чек</div><div class="sc-v purple" style="font-size:15px">${moneyFmt(avgPrice)}</div></div>
    <div class="sc c-amber"><span class="sc-icon">✅</span><div class="sc-l">Оплачених</div><div class="sc-v amber">${paidPct}%</div></div>
    <div class="sc c-red"><span class="sc-icon">⚠️</span><div class="sc-l">Прострочено</div><div class="sc-v red">${overdueCount}</div></div>
  </div>
  <div class="stats-main-grid" style="display:grid;grid-template-columns:3fr 2fr;gap:14px;margin-bottom:14px">
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px"><div style="font-size:13px;font-weight:800;margin-bottom:12px;color:var(--text)">Динаміка по місяцях</div><div style="position:relative;height:220px"><canvas id="stats-chart-monthly"></canvas></div></div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px"><div style="font-size:13px;font-weight:800;margin-bottom:12px;color:var(--text)">Популярні пристрої</div><div style="position:relative;height:170px;margin-bottom:12px"><canvas id="stats-chart-types"></canvas></div><div>${typeRows||'<div style="color:var(--text3);text-align:center;padding:20px">Немає даних</div>'}</div></div>
  </div>
  <div class="stats-main-grid" style="display:grid;grid-template-columns:3fr 2fr;gap:14px">
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px"><div style="font-size:13px;font-weight:800;margin-bottom:12px;color:var(--text)">Рейтинг майстрів</div><div style="display:flex;flex-direction:column;gap:8px">${masterCards||'<div style="color:var(--text3);text-align:center;padding:20px">Немає даних</div>'}</div></div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px"><div style="font-size:13px;font-weight:800;margin-bottom:12px;color:var(--text)">Статуси зараз</div><div style="display:flex;flex-direction:column;gap:7px">${statusCards||'<div style="color:var(--text3);text-align:center;padding:20px">Немає даних</div>'}</div><div style="position:relative;height:160px;margin-top:14px"><canvas id="stats-chart-status"></canvas></div></div>
  </div>`;
}

  const d = window._statsData;
  if(!d || typeof Chart==='undefined') return;
  const text = chartText();
  const grid = chartGrid();
  const bg = chartBg();

  const ctx1 = document.getElementById('stats-chart-monthly');
  if(ctx1){
    if(ctx1._chart) ctx1._chart.destroy();
    ctx1._chart = new Chart(ctx1,{
      type:'bar',
      data:{
        labels:d.byMonth.map(m=>m.month || m.m),

function whPartRoot(p){
  const s=((p.category||'')+' '+(p.name||'')+' '+(p.compatible||'')).toLowerCase();
  if(s.includes('iphone')) return '📱 iPhone';
  if(s.includes('ipad')) return '📲 iPad';
  if(s.includes('macbook')) return '💻 MacBook';
  if(s.includes('watch')) return '⌚ Apple Watch';
  if(s.includes('airpods')) return '🎧 AirPods';
  return '🧰 Витратні матеріали';
}
function whPartSub(p){
  const s=((p.category||'')+' '+(p.name||'')).toLowerCase();
  const cat=String(p.category||'');
  if(cat.includes('/')) return cat.split('/').slice(1).join('/').trim();
  if(s.includes('дисплей') || s.includes('oled') || s.includes('ips') || s.includes('екран')) return 'Дисплеї';
  if(s.includes('акб') || s.includes('акум') || s.includes('battery')) return 'Акумулятори';
  if(s.includes('шлейф') || s.includes('заряд')) return 'Шлейфи зарядки';
  if(s.includes('камера')) return 'Камери';
  if(s.includes('заднє скло') || s.includes('стекло')) return 'Заднє скло';
  if(s.includes('корпус')) return 'Корпуси';
  if(s.includes('кейс')) return 'Кейси';
  if(s.includes('амбуш') || s.includes('сітки') || s.includes('сетки')) return 'Дрібні комплектуючі';
  if(s.includes('клей') || s.includes('скотч')) return 'Клей / скотч';
  if(s.includes('спирт') || s.includes('сервет')) return 'Хімія';
  if(s.includes('термо')) return 'Термоматеріали';
  if(s.includes('гвинт') || s.includes('магніт')) return 'Гвинти / дрібниці';
  return 'Інше';
}
function whPartModel(p){
  return String(p.compatible||'').trim() || 'Без моделі';
}
function whBuildTree(){
  const tree={};
  parts.forEach(p=>{
    const root=whPartRoot(p), sub=whPartSub(p), model=whPartModel(p);
    if(!tree[root]) tree[root]={};
    if(!tree[root][sub]) tree[root][sub]=new Set();
    tree[root][sub].add(model);
  });
  return tree;
}

function whEsc(v){ return String(v||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function whToggle(key){
  whOpenFolders[key]=!whOpenFolders[key];
  localStorage.setItem('whOpenFolders',JSON.stringify(whOpenFolders));
  render();
}
function whOpenSelect(path){
  warehouseFolderPath=path||'';
  if(path) whOpenFolders[path]=!whOpenFolders[path];
  localStorage.setItem('whOpenFolders',JSON.stringify(whOpenFolders));
  render();
}
function whSelect(path){
  warehouseFolderPath=path||'';
  render();
}
function whMatchesFolder(p){
  if(!warehouseFolderPath) return true;
  const partsPath=warehouseFolderPath.split(' / ');
  const root=whPartRoot(p), sub=whPartSub(p), model=whPartModel(p);
  if(partsPath[0] && root!==partsPath[0]) return false;
  if(partsPath[1] && sub!==partsPath[1]) return false;
  if(partsPath[2] && model!==partsPath[2]) return false;
  return true;
}

function whRenderTree(){
  const tree=whBuildTree();
  let html=`<div class="wh-folder ${!warehouseFolderPath?'on':''}" onclick="whSelect('')"><span class="wh-spacer"></span><span>📦</span><span>Весь склад</span></div>`;

  Object.keys(tree).sort().forEach(root=>{
    const rootKey=root;
    const rootOpen=(rootKey in whOpenFolders) ? !!whOpenFolders[rootKey] : (warehouseFolderPath===rootKey || warehouseFolderPath.startsWith(rootKey+' / '));
    const rootSafe=whEsc(rootKey);
    html+=`<div class="wh-folder root toggle ${warehouseFolderPath===rootKey?'on':''} ${rootOpen?'open':''}" onclick="whOpenSelect('${rootSafe}')">
      <span class="wh-caret">${rootOpen?'▼':'▶'}</span>
      <span>${root}</span>
    </div>`;

    html+=`<div class="wh-children ${rootOpen?'open':''}">`;

    Object.keys(tree[root]).sort().forEach(sub=>{
      const subPath=root+' / '+sub;
      const subOpen=(subPath in whOpenFolders) ? !!whOpenFolders[subPath] : (warehouseFolderPath===subPath || warehouseFolderPath.startsWith(subPath+' / '));
      const subSafe=whEsc(subPath);

      html+=`<div class="wh-folder wh-sub toggle ${warehouseFolderPath===subPath?'on':''} ${subOpen?'open':''}" onclick="whOpenSelect('${subSafe}')">
        <span class="wh-caret">${subOpen?'▼':'▶'}</span>
        <span>📁</span>
        <span>${sub}</span>
      </div>`;

      html+=`<div class="wh-children ${subOpen?'open':''}">`;

      Array.from(tree[root][sub]).sort().forEach(model=>{
        const path=root+' / '+sub+' / '+model;
        const pathSafe=whEsc(path);
        html+=`<div class="wh-folder wh-model ${warehouseFolderPath===path?'on':''}" onclick="whSelect('${pathSafe}')"><span class="wh-spacer"></span><span>${model}</span></div>`;
      });

      html+=`</div>`;
    });

    html+=`</div>`;
  });

  return html;
}

async function savePart(){
  const body={
    name:document.getElementById('p-name').value.trim(),
    category:document.getElementById('p-category').value.trim(),
    compatible:document.getElementById('p-compatible').value.trim(),
    qty:Number(document.getElementById('p-qty').value||0),
    min_qty:Number(document.getElementById('p-min_qty').value||1),
    buy_price:Number(document.getElementById('p-buy_price').value||0),
    sell_price:Number(document.getElementById('p-sell_price').value||0),
    supplier:document.getElementById('p-supplier').value.trim(),
    notes:document.getElementById('p-notes').value.trim(),
  };
  if(!body.name){alert('Вкажіть назву запчастини');return;}
  if(partEditId) await api('PUT','/api/parts/'+partEditId,body); else await api('POST','/api/parts',body);
  document.getElementById('part-modal').remove();
  await loadParts(); render(); toast('Склад оновлено');
}

async function adjustPart(id,delta){
  const note=prompt(delta>0?'Коментар до приходу':'Коментар до списання','');
  if(note===null) return;
  const r=await api('PATCH','/api/parts/'+id+'/adjust',{delta,note});
  if(r && r.error){alert(r.error);return;}
  await loadParts(); render();
}

async function deletePart(id){
  if(!confirm('Видалити запчастину зі складу?')) return;
  await api('DELETE','/api/parts/'+id);
  await loadParts(); render(); toast('Запчастину видалено');
}

async function importPartsCSV(input){
  const file=input.files && input.files[0];
  if(!file) return;
  if(!confirm('Імпортувати номенклатуру зі CSV? Якщо назва вже є — позиція оновиться.')){ input.value=''; return; }
  const fd=new FormData();
  fd.append('file',file);
  const r=await apiForm('/api/parts/import',fd);
  input.value='';
  if(r && r.error){alert(r.error);return;}
  await loadParts();
  render();
  toast(`Імпортовано: додано ${r.created||0}, оновлено ${r.updated||0}`);
}

      <div class="range-row"><label>Темний overlay</label><input type="range" min="0" max="90" id="bg-overlay" value="${localStorage.getItem('crm_bg_overlay')||40}" oninput="saveVisualLocal()"><b id="bg-overlay-v">${localStorage.getItem('crm_bg_overlay')||40}%</b></div>

function renderFinanceSettingsTab(){return `<div class="set-card" style="max-width:720px"><h3>💰 Фінанси</h3><div class="role-list"><div>Методи оплати: <b>Готівка</b>, <b>Картка</b>, <b>Переказ</b></div><div>Категорії витрат будуть додані наступним точковим етапом.</div></div></div>`;}

  const s=settings;
