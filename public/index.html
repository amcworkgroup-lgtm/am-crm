function renderBackupSettingsTab(){return `<div class="set-card" style="max-width:720px"><h3>💾 Резервні копії</h3><div style="display:flex;gap:10px;flex-wrap:wrap"><a href="/api/backup" style="text-decoration:none"><button class="btn blue">⬇ Резервна копія БД</button></a><a href="/api/export/repairs" style="text-decoration:none"><button class="btn green">⬇ Ремонти CSV</button></a></div><div style="font-size:12px;color:var(--text2);margin-top:10px">Рекомендовано робити копію щотижня.</div></div>`;}

async function openUserModal(id=null){
  const u=id?(users||[]).find(x=>x.id===id):null;
  const html=`<div class="modal-ov" id="user-modal"><div class="modal sm"><h3>${u?'Редагувати користувача':'Додати користувача'}</h3><div class="fg" style="grid-template-columns:1fr;gap:10px"><div class="frow"><label>Ім’я</label><input class="inp" id="u-name" value="${u?.name||''}"></div><div class="frow"><label>Логін</label><input class="inp" id="u-login" value="${u?.login||''}"></div><div class="frow"><label>Пароль ${u?'(залиште пустим, якщо не міняти)':''}</label><input class="inp" type="password" id="u-password"></div><div class="frow"><label>Роль</label><select class="sel" id="u-role"><option value="admin" ${u?.role==='admin'?'selected':''}>Адмін</option><option value="manager" ${u?.role==='manager'?'selected':''}>Менеджер</option><option value="master" ${u?.role==='master'?'selected':''}>Майстер</option><option value="finance" ${u?.role==='finance'?'selected':''}>Фінансист</option></select></div><div class="frow"><label>Статус</label><select class="sel" id="u-active"><option value="1" ${u?.active!==0?'selected':''}>Активний</option><option value="0" ${u?.active===0?'selected':''}>Вимкнений</option></select></div></div><div class="mfoot"><button class="btn" onclick="document.getElementById('user-modal').remove()">Скасувати</button><button class="btn orange" onclick="saveUser(${id||'null'})">Зберегти</button></div></div></div>`;
  document.body.insertAdjacentHTML('beforeend',html);
}

async function saveUser(id=null){
  const body={name:document.getElementById('u-name').value.trim(),login:document.getElementById('u-login').value.trim(),password:document.getElementById('u-password').value,role:document.getElementById('u-role').value,active:+document.getElementById('u-active').value};
  if(!body.login){showToast('Вкажіть логін');return;}
  if(!id && !body.password){showToast('Вкажіть пароль');return;}
  const r=await api(id?'PUT':'POST',id?'/api/users/'+id:'/api/users',body);
  if(r&&r.error){showToast(r.error);return;}
  document.getElementById('user-modal')?.remove();
  await loadUsers();render();showToast('✓ Користувача збережено');
}

async function deleteUser(id){if(!confirm('Видалити користувача?'))return;await api('DELETE','/api/users/'+id);await loadUsers();render();}

function uploadBgImage(e){
  const file=e.target.files&&e.target.files[0]; if(!file)return;
  if(file.size>5*1024*1024){showToast('Файл завеликий. Максимум 5MB');return;}
  const r=new FileReader();
  r.onload=()=>{localStorage.setItem('crm_bg_image',r.result);localStorage.setItem('crm_bg_enabled','1');applyVisualSettings();render();};
  r.readAsDataURL(file);
}
function removeBgImage(){localStorage.removeItem('crm_bg_image');localStorage.removeItem('crm_bg_preset');applyVisualSettings();render();}
function chooseBgPreset(p){localStorage.setItem('crm_bg_preset',p);localStorage.removeItem('crm_bg_image');localStorage.setItem('crm_bg_enabled','1');applyVisualSettings();render();}
function saveVisualLocal(){
  const en=document.getElementById('bg-enabled'); const op=document.getElementById('bg-opacity'); const ov=document.getElementById('bg-overlay');
  if(en)localStorage.setItem('crm_bg_enabled',en.checked?'1':'0'); if(op)localStorage.setItem('crm_bg_opacity',op.value); if(ov)localStorage.setItem('crm_bg_overlay',ov.value);
  applyVisualSettings();applyVisualPreview();
}
function bgPresetCss(p){return {hex:'radial-gradient(circle at 40% 30%,rgba(249,115,22,.24),transparent 30%),linear-gradient(135deg,#07090d,#151a24)',metal:'linear-gradient(135deg,#222,#0b0b0b)',carbon:'repeating-linear-gradient(45deg,#101010 0 10px,#181818 10px 20px)',wood:'linear-gradient(90deg,#2a1a10,#5a351d,#21140c)'}[p]||'';}
function applyVisualSettings(){
  const enabled=localStorage.getItem('crm_bg_enabled')!=='0'; const img=localStorage.getItem('crm_bg_image'); const preset=localStorage.getItem('crm_bg_preset'); const opacity=(localStorage.getItem('crm_bg_opacity')||20)/100; const overlay=(localStorage.getItem('crm_bg_overlay')||40)/100;
  document.body.style.backgroundImage=''; document.body.style.backgroundSize='cover'; document.body.style.backgroundPosition='center';
  document.documentElement.style.setProperty('--previewOverlay',overlay);
  if(enabled&&img){document.body.style.backgroundImage=`linear-gradient(rgba(15,17,23,${overlay}),rgba(15,17,23,${overlay})),url(${img})`;}
  else if(enabled&&preset){document.body.style.backgroundImage=`linear-gradient(rgba(15,17,23,${overlay}),rgba(15,17,23,${overlay})),${bgPresetCss(preset)}`;}
  document.body.style.backgroundColor=`rgba(15,17,23,${1-opacity})`;
}
function applyVisualPreview(){
  const prev=document.getElementById('visual-preview'); if(!prev)return;
  const img=localStorage.getItem('crm_bg_image'); const preset=localStorage.getItem('crm_bg_preset');
  prev.style.backgroundImage=img?`url(${img})`:(preset?bgPresetCss(preset):'linear-gradient(135deg,#111827,#090b10)');
  ['hex','metal','carbon','wood'].forEach(p=>document.getElementById('preset-'+p)?.classList.toggle('on',preset===p));
  const op=document.getElementById('bg-opacity'),ov=document.getElementById('bg-overlay');
  if(op)document.getElementById('bg-opacity-v').textContent=op.value+'%'; if(ov)document.getElementById('bg-overlay-v').textContent=ov.value+'%';
}
async function saveSettings(keys){
  const body={};
  keys.forEach(k=>{
    const el=document.getElementById('s-'+k);
    if(el) body[k]=el.value;
  });
  await api('PUT','/api/settings',body);
  Object.assign(settings,body);
  applyAccent();
  showToast('✓ Збережено!');
  render();
}

async function pickAccent(color){
  settings.accent_color=color;
  await api('PUT','/api/settings',{accent_color:color});
  applyAccent();
  render();
}

async function changePassword(){
  const cur=document.getElementById('pw-current').value;
  const nw=document.getElementById('pw-new').value;
  const conf=document.getElementById('pw-confirm').value;
  const msg=document.getElementById('pw-msg');
  if(!cur||!nw) return msg.textContent='Заповніть всі поля';
  if(nw!==conf) return msg.textContent='Паролі не співпадають';
  if(nw.length<6) return msg.textContent='Мінімум 6 символів';
  const r=await api('POST','/api/change-password',{current:cur,newPass:nw});
  if(r&&r.ok){msg.style.color='var(--green)';msg.textContent='✓ Пароль змінено!';}
  else{msg.style.color='var(--red)';msg.textContent=r?.error||'Помилка';}
}

function editMasterRate(id,name,rate){
  const nr=prompt(`Ставка для ${name} (%):`,rate);
  if(nr===null)return;
  api('PUT','/api/settings',{[`master_rate_${id}`]:nr}).then(()=>{
    Object.assign(settings,{[`master_rate_${id}`]:nr});
    render();
  });
}

function toast(text){showToast(text);}
function showToast(text){
  const el=document.createElement('div');
  el.className='toast';el.textContent=text;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2200);
}

async function addMaster(){
  const el=document.getElementById('new-master');
  if(!el||!el.value.trim())return;
  await api('POST','/api/masters',{name:el.value.trim()});
  await loadMasters();render();
}
async function delMaster(id){
  if(!confirm('Видалити майстра?'))return;
  await api('DELETE','/api/masters/'+id);await loadMasters();render();
}

// ── THEME ──
function toggleTheme(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  const next=isDark?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('crm_theme',next);
  document.getElementById('theme-btn').textContent=next==='dark'?'☀️':'🌙';
}
function initTheme(){
  const saved=localStorage.getItem('crm_theme')||'light';
  document.documentElement.setAttribute('data-theme',saved);
  const btn=document.getElementById('theme-btn');
  if(btn)btn.textContent=saved==='dark'?'☀️':'🌙';
}

// ── STATS ICONS ──
const STAT_ICONS={active:'🔧',overdue:'⚠️',revenue:'📈',profit:'💰',debt:'💳',cash:'🏦'};

// ── DEVICE TYPE ROW CLASS ──
function deviceClass(type){
  if(!type)return '';
  const t=type.toLowerCase();
  if(t.includes('iphone'))return 'type-iphone';
  if(t.includes('samsung'))return 'type-samsung';
  if(t.includes('ipad'))return 'type-ipad';
  if(t.includes('mac'))return 'type-mac';
  return 'type-other';
}

// ── OVERRIDE toast ──
function copyText(text){
  navigator.clipboard.writeText(text).then(()=>{
    const el=document.createElement('div');
    el.className='toast';
    el.textContent='✓ Скопійовано!';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2200);
  });
}

// ── BOOT (override) ──
window.onload=()=>{
  initTheme();
  if(TOKEN){
    document.getElementById('login-screen').style.display='none';
    const app=document.getElementById('app');app.classList.add('is-ready');app.style.display='';app.style.flexDirection='';
    loadAll();
  }
};
</script>
