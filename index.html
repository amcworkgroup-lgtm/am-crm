<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AM Store CRM Patch</title>
<style>
.tr-status-diagnostic{border-left:4px solid #3b82f6!important}
.tr-status-progress{border-left:4px solid #f59e0b!important}
.tr-status-ready{border-left:4px solid #22c55e!important}
.tr-status-issued{border-left:4px solid #9ca3af!important}

.repair-side-panel{
position:fixed;top:18px;right:18px;width:360px;height:calc(100vh - 36px);
background:#111827;border:1px solid rgba(255,255,255,.08);
border-radius:20px;z-index:200;overflow:auto;padding:18px;
box-shadow:0 20px 50px rgba(0,0,0,.45);color:#fff
}
</style>
</head>
<body>
<div id="repair-side-panel-root"></div>

<script>
function getRepairRowClass(status){
  if(status === 'На діагностиці') return 'tr-status-diagnostic';
  if(status === 'В ремонті') return 'tr-status-progress';
  if(status === 'Готово') return 'tr-status-ready';
  if(status === 'Видано') return 'tr-status-issued';
  return '';
}
</script>
</body>
</html>
